<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<title>Async JavaScript Lab</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2c3e50);
    color: white;
}

h1 {
    text-align: center;
    padding: 20px;
    margin: 0;
    font-weight: 300;
}

#container {
    display: flex;
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: #2a2a3d;
    border-radius: 15px;
    padding: 20px;
    flex: 1;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 220px;
    background: #1e1e2f;
    color: #00ffcc;
    border: none;
    border-radius: 10px;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    outline: none;
}

/* BUTTONS */
button {
    margin-top: 10px;
    margin-right: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.run {
    background: #00c853;
    color: white;
}
.run:hover {
    background: #00e676;
}

.clear {
    background: #d50000;
    color: white;
}
.clear:hover {
    background: #ff1744;
}

/* CONSOLE */
#myconsole {
    background: black;
    color: #00ff00;
    font-family: monospace;
    height: 300px;
    overflow-y: auto;
    border-radius: 10px;
    padding: 10px;
}

/* MENU */
ul {
    margin-top: 15px;
    padding: 0;
}

li {
    list-style: none;
    margin-bottom: 8px;
}

a {
    text-decoration: none;
    color: #00e5ff;
    transition: 0.2s;
}

a:hover {
    color: #18ffff;
}
</style>

<script>
let my = {
    log: function(msg) {
        document.getElementById("myconsole").innerHTML += "➜ " + msg + "<br>";
    }
};

function sterge(){
    document.getElementById("myconsole").innerHTML = "";
}

function deseneaza(){
    sterge();
    let code = document.getElementById("textArea").value;
    try {
        eval(code);
    } catch(e){
        my.log("Eroare: " + e.message);
    }
}
</script>

</head>

<body>

<h1>⚡ Async JavaScript Playground</h1>

<div id="container">

    <!-- LEFT -->
    <div class="card">
        <textarea id="textArea"></textarea><br/>

        <button class="run" onclick="deseneaza()">▶ RUN</button>
        <button class="clear" onclick="sterge()">✖ CLEAR</button>

        <ul>
            <li><a href="javascript:loadex(0)">📘 Ex 1 - sincron</a></li>
            <li><a href="javascript:loadex(1)">⏳ Ex 2 - asincron</a></li>
            <li><a href="javascript:loadex(2)">🎨 Ex 3 - setTimeout</a></li>
            <li><a href="javascript:loadex(3)">🔄 Ex 4 - setInterval</a></li>
        </ul>
    </div>

    <!-- RIGHT -->
    <div class="card">
        <div id="myconsole">Console ready...</div>
    </div>

</div>

<script>
let arrex = [

`let carti = ["Ion", "Morometii", "Baltagul", "Enigma Otiliei", "Maitreyi"];

for(let i = 0; i < carti.length; i++){
    my.log((i+1) + ". " + carti[i]);
}`,

`function ArrayPlusDelay(array, delegate, delay) {
    array.forEach(function(el, i){
        setTimeout(function(){
            delegate(array[i]);
        }, i * delay);
    });
}

let carti = ["Ion", "Morometii", "Baltagul", "Enigma Otiliei", "Maitreyi"];

ArrayPlusDelay(carti, function(el){
    my.log(el);
}, 2000);`,

`let box = document.createElement("div");
box.innerHTML = "Text colorat";
box.style.border = "2px solid white";
box.style.padding = "20px";
box.style.marginTop = "10px";
box.style.backgroundColor = "red";
document.body.appendChild(box);

setTimeout(function(){
    box.style.backgroundColor = "blue";
}, 3000);`,

`let box = document.createElement("div");
box.innerHTML = "Schimbare continua";
box.style.border = "2px solid white";
box.style.padding = "20px";
box.style.marginTop = "10px";
document.body.appendChild(box);

let colors = ["red", "blue", "green", "yellow"];
let i = 0;

setInterval(function(){
    box.style.backgroundColor = colors[i % colors.length];
    i++;
}, 5000);`
];

function loadex(nr){
    document.getElementById("textArea").value = arrex[nr];
}
</script>

</body>
</html>
